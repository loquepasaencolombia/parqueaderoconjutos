name: Build Installers

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx electron-packager . "Parqueadero Inteligente" --platform=darwin --arch=x64 --icon=iconos/icon.icns --out=dist --overwrite
      - run: npm install -g create-dmg
      - run: create-dmg "dist/Parqueadero Inteligente-darwin-x64/Parqueadero Inteligente.app" dist/ || true
      - uses: actions/upload-artifact@v4
        with:
          name: Parqueadero-Mac
          path: dist/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx electron-packager . "Parqueadero Inteligente" --platform=win32 --arch=x64 --icon=iconos/icon.ico --out=dist --overwrite
      - uses: actions/upload-artifact@v4
        with:
          name: Parqueadero-Windows
          path: dist/**/*.exe
